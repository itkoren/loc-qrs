name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1.6
          args: --timeout=5m

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Install C compiler (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y gcc

      - name: Unit tests
        run: CGO_ENABLED=1 go test ./... -race -count=1 -timeout=120s

      - name: Integration tests
        run: CGO_ENABLED=1 go test ./... -race -count=1 -timeout=180s -tags=integration

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Install C compiler
        run: sudo apt-get install -y gcc

      - name: Build binary
        run: |
          CGO_ENABLED=1 go build \
            -ldflags="-X main.version=dev-${GITHUB_SHA::8}" \
            -o bin/server-linux-amd64 \
            ./cmd/server

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: server-linux-amd64-ci
          path: bin/server-linux-amd64
