version: "2"

run:
  timeout: 5m
  build-tags:
    - integration

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/itkoren/loc-qrs

linters:
  default: none
  enable:
    - bodyclose
    - cyclop
    - errcheck
    - exhaustive
    - gocritic
    - govet
    - ineffassign
    - misspell
    - noctx
    - revive
    - staticcheck
    - unused

  settings:
    cyclop:
      max-complexity: 15

    exhaustive:
      default-signifies-exhaustive: true

    govet:
      enable:
        - shadow

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam       # Schema is passed by pointer everywhere
        - unnamedResult   # single return values are intentionally unnamed

    errcheck:
      check-blank: true
      exclude-functions:
        - (net/http.ResponseWriter).Write
        - (*encoding/json.Encoder).Encode
        - os.Remove
        - (*os.File).Close
        - (*database/sql.Rows).Close
        - (*database/sql.DB).Close
        - path/filepath.Glob

    revive:
      rules:
        - name: exported
          arguments:
            - disableStutteringCheck

